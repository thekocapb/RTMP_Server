# Конфигурация SRS (Simple Realtime Server)
# Документация: https://ossrs.io/lts/en-us/docs/v5/doc/introduction

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

# HTTP-сервер для HLS, HTTP-FLV и встроенного плеера
http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

# HTTP API для управления сервером
http_api {
    enabled         on;
    listen          1985;
}

# Статистика
stats {
    network         0;
}

# Основной виртуальный хост
vhost __defaultVhost__ {

    # HLS — нарезка потока на сегменты для браузеров
    hls {
        enabled         on;
        hls_fragment    2;
        hls_window      10;
        hls_path        ./objs/nginx/html;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].ts;
    }

    # HTTP-FLV — низколатентная раздача через HTTP
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    # WebRTC — сверхнизкая задержка
    rtc {
        enabled     on;
        rtmp_to_rtc on;
        rtc_to_rtmp on;
    }

    # Транскодирование (опционально, раскомментировать при необходимости)
    # transcode {
    #     enabled     on;
    #     ffmpeg      ./objs/ffmpeg/bin/ffmpeg;
    #     engine ff {
    #         enabled         on;
    #         vcodec          libx264;
    #         vbitrate        500;
    #         vfps            25;
    #         vwidth          720;
    #         vheight         480;
    #         acodec          aac;
    #         abitrate        64;
    #         asample_rate    44100;
    #         achannels       2;
    #         output          rtmp://127.0.0.1:[port]/[app]?vhost=[vhost]/[stream]_[engine];
    #     }
    # }

    # DVR — запись потока на диск (опционально)
    # dvr {
    #     enabled         on;
    #     dvr_path        ./objs/nginx/html/[app]/[stream].[timestamp].flv;
    #     dvr_plan        session;
    # }
}
